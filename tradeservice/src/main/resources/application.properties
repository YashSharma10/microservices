server.port=8084

# Datasource (MySQL). Override via environment variables in production/CI.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/tradedb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize schema from classpath
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
