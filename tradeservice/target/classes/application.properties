spring.application.name=tradeservice
server.port=8084

# Config Server (optional)
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.username=admin
spring.cloud.config.password=admin
spring.cloud.config.fail-fast=false

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Datasource (MySQL). Override via environment variables in production/CI.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/tradedb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:8076107814@Yash}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize schema from classpath
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Service URLs - route through API Gateway for proper authentication
api.gateway.base=${API_GATEWAY_BASE:http://localhost:9004}
users.service.base=${USERS_SERVICE_BASE:http://localhost:9004/users}
carbon.service.base=${CARBON_SERVICE_BASE:http://localhost:9004/carbon}

# Alternative: Direct service URLs (requires service authentication)
# users.service.base=http://localhost:8082/users
# carbon.service.base=http://localhost:8083/carbon

# Service credentials for inter-service communication
service.auth.username=${SERVICE_AUTH_USERNAME:trade_service_user}
service.auth.password=${SERVICE_AUTH_PASSWORD:trade_service_pass}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
