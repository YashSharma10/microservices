spring.application.name=userservice
server.port=8082

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Datasource (MySQL) - override via environment variables in production
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/carboncreditdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:8076107814@Yash}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize schema from schema.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
