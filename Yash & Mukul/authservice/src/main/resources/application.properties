spring.application.name=authservice
server.port=8081

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Datasource (MySQL). Use environment variables to override in production.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/authdb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:8076107814@Yash}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize schema from classpath:schema.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT properties (replace secret in production via env var)
jwt.secret=${JWT_SECRET:changeit-changeit-changeit-changeit}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
