spring.application.name=carbonservice
server.port=8083

# Config Server (optional)
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.username=admin
spring.cloud.config.password=admin
spring.cloud.config.fail-fast=false

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# MySQL datasource (use env vars to override)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/carbondb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:8076107814@Yash}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize DB schema from schema.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Service credentials
carbonservice.auth.username=carbon_service_user
carbonservice.auth.password=carbon_service_pass

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
