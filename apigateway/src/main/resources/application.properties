spring.application.name=apigateway
server.port=9004

# Make config server optional
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.username=admin
spring.cloud.config.password=admin
spring.cloud.config.fail-fast=false

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Per-service credentials used by ApiGateway when forwarding requests
carbonservice.auth.username=carbon_service_user
carbonservice.auth.password=carbon_service_pass

tradeservice.auth.username=trade_service_user
tradeservice.auth.password=trade_service_pass

userservice.auth.username=user_service_user
userservice.auth.password=user_service_pass

apigateway.shared.secret=super-secret-value

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
